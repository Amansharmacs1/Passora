<!DOCTYPE html>
<html>
<head>
    <title>Passora</title>
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <div class="header">
        <h2>Passora</h2>
    </div>
    
    <div id="login-view" class="view">
        <form id="login-form">
            <input type="email" id="email" placeholder="Email" required />
            <input type="password" id="password" placeholder="Password" required />
            <button type="submit">Login</button>
        </form>
        <p id="login-error" class="error hidden"></p>
    </div>

    <div id="vault-view" class="view hidden">
        <div class="search-bar">
            <input type="text" id="search" placeholder="Search passwords..." />
        </div>
        <div id="vault-list" class="vault-list">
            <!-- Vault items will be injected here -->
        </div>
        <button id="logout-btn" class="secondary">Logout</button>
    </div>

    <script src="popup.js"></script>
</body>
</html>
